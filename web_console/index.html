<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Consola AI — Single Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Consola AI (simulare)</h1>
      <p>Introdu comanda ta; răspunsul AI apare ca "recipient".</p>
    </header>

    <main id="console" aria-live="polite"></main>

    <form id="promptForm" autocomplete="off">
      <input id="promptInput" placeholder="Scrie prompt-ul aici..." autofocus />
      <button type="submit">Trimite</button>
      <button type="button" id="resetBtn">Reset</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
